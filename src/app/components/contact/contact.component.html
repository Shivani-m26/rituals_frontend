<section id="contact-form" class="relative z-10 py-16 md:py-20 px-4">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-journal shadow-journal border-2 border-cream p-8 md:p-12 relative overflow-hidden">
            <!-- Decorative elements -->
            <div class="absolute -top-4 -right-4 w-20 h-20 bg-baby-blue opacity-20 rounded-full blur-xl"></div>
            <div class="absolute -bottom-6 -left-6 w-24 h-24 bg-pastel-pink opacity-20 rounded-full blur-xl"></div>

            <div class="text-center relative z-10 mb-8">
                <span class="text-4xl block mb-3">💌</span>
                <h2 class="font-handwritten text-4xl md:text-5xl text-coffee-dark mb-2">Get in Touch</h2>
                <p class="text-coffee-light italic text-sm">We'd love to hear from you. Drop us a note!</p>
            </div>

            <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="relative z-10 space-y-5 max-w-lg mx-auto">
                <!-- Name -->
                <div>
                    <label class="block font-handwritten text-xl text-coffee mb-1 ml-1">Your Name</label>
                    <input formControlName="name" type="text" 
                        class="w-full px-4 py-3 bg-cream border-none rounded-sticky text-coffee shadow-sticky focus:ring-2 focus:ring-baby-blue transition-all duration-300"
                        placeholder="e.g. Shivani">
                    <div *ngIf="contactForm.get('name')?.touched && contactForm.get('name')?.invalid" class="text-xs text-red-400 mt-1 ml-1 italic">
                        Please enter your name.
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block font-handwritten text-xl text-coffee mb-1 ml-1">Email Address ✉️</label>
                    <input formControlName="email" type="email" 
                        class="w-full px-4 py-3 bg-cream border-none rounded-sticky text-coffee shadow-sticky focus:ring-2 focus:ring-baby-blue transition-all duration-300"
                        placeholder="you@example.com">
                    <div *ngIf="contactForm.get('email')?.touched && contactForm.get('email')?.invalid" class="text-xs text-red-400 mt-1 ml-1 italic">
                        Please enter a valid email.
                    </div>
                </div>

                <!-- Phone Number -->
                <div>
                    <label class="block font-handwritten text-xl text-coffee mb-1 ml-1">Phone Number 📱</label>
                    <input formControlName="phone" type="tel" 
                        class="w-full px-4 py-3 bg-cream border-none rounded-sticky text-coffee shadow-sticky focus:ring-2 focus:ring-baby-blue transition-all duration-300"
                        placeholder="+91 98765 43210">
                    <div *ngIf="contactForm.get('phone')?.touched && contactForm.get('phone')?.invalid" class="text-xs text-red-400 mt-1 ml-1 italic">
                        Please enter a valid phone number.
                    </div>
                </div>

                <!-- Comments -->
                <div>
                    <label class="block font-handwritten text-xl text-coffee mb-1 ml-1">Your Message 📝</label>
                    <textarea formControlName="comments" rows="4"
                        class="w-full px-4 py-3 bg-cream border-none rounded-sticky text-coffee shadow-sticky focus:ring-2 focus:ring-baby-blue transition-all duration-300 resize-none"
                        placeholder="Tell us what's on your mind..."></textarea>
                    <div *ngIf="contactForm.get('comments')?.touched && contactForm.get('comments')?.invalid" class="text-xs text-red-400 mt-1 ml-1 italic">
                        Please write at least 10 characters.
                    </div>
                </div>

                <!-- Success Message -->
                <div *ngIf="successMessage" class="bg-green-50 text-green-600 p-4 rounded-sticky text-sm italic border border-green-100 text-center animate-fade-in">
                    {{ successMessage }}
                </div>

                <!-- Error Message -->
                <div *ngIf="errorMessage" class="bg-red-50 text-red-500 p-4 rounded-sticky text-sm italic border border-red-100 text-center animate-wiggle">
                    {{ errorMessage }}
                </div>

                <!-- Submit Button -->
                <button type="submit" [disabled]="contactForm.invalid || isLoading"
                    class="w-full relative group overflow-hidden bg-baby-blue px-4 py-4 rounded-sticky text-coffee-dark font-handwritten text-2xl shadow-sticky-hover hover:scale-[1.02] active:scale-95 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span class="relative z-10 flex items-center justify-center">
                        <span *ngIf="!isLoading">Send Message ✈️</span>
                        <span *ngIf="isLoading" class="flex items-center">
                            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-coffee-dark" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Sending...
                        </span>
                    </span>
                    <div class="absolute inset-0 bg-white/20 transform -translate-x-full group-hover:translate-x-0 transition-transform duration-300"></div>
                </button>
            </form>
        </div>
    </div>
</section>
